name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -t rsa,ecdsa 137.184.37.34 >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Debug host keys
        run: |
          echo "--- scanned fingerprints ---"
          ssh-keyscan -t rsa,ecdsa 137.184.37.34 2>/dev/null | ssh-keygen -lf -
          echo "--- known_hosts contents ---"
          cat ~/.ssh/known_hosts

      - name: Write master key
        run: echo "${{ secrets.RAILS_MASTER_KEY }}" > config/master.key

      - name: Deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: bin/kamal deploy
